name: Google Trends (daily)

# Runs on Microsoft's servers, so it fires every day whether or not your
# laptop is on. The note is committed into this repo (notes/); your laptop
# later pulls it into the Obsidian vault.

on:
  schedule:
    # GitHub cron is UTC only. 13:00 UTC = 9:00 AM US Eastern (EDT) / 8:00 AM (EST).
    - cron: "0 13 * * *"
  workflow_dispatch: {}   # adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write          # allow the job to commit + push the new note

concurrency:
  group: trends            # never run two scrapes at once
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape trending searches
        run: python trends_scraper.py --output-dir notes

      - name: Commit the new note
        run: |
          git config user.name  "trends-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "trends: $(date -u +%F)"
            git push
          fi
